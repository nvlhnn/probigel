# ─────────────────────────────────────────────────────────────
# Decap CMS Configuration — Probiogel
# Best-practice setup: editorial workflow, i18n, local dev
# ─────────────────────────────────────────────────────────────

# Enable local backend for development (run: npx decap-server)
local_backend: true

backend:
  name: git-gateway
  branch: main
  # Squash merge keeps git history clean
  squash_merges: true

# Editorial workflow: content goes through draft → review → publish
publish_mode: editorial_workflow

# Indonesian locale for CMS UI labels
locale: id

# Branding
site_url: https://probiogel.id
display_url: https://probiogel.id
logo_url: /images/logo-probiogel.png

# Media
media_folder: "src/images/uploads"
public_folder: "/images/uploads"

# Disable preview pane globally (enable per-collection where useful)
editor:
  preview: false

# ─────────────────────────────────────────────────────────────
# COLLECTIONS
# ─────────────────────────────────────────────────────────────

collections:
  # ═══════════════════════════════════════════════════════════
  # ARTIKEL (Folder Collection — Markdown files)
  # ═══════════════════════════════════════════════════════════
  - name: "articles"
    label: "📝 Artikel"
    label_singular: "Artikel"
    folder: "src/content/articles"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title", "category"]
    summary: "{{title}} — {{category}} ({{year}}/{{month}}/{{day}})"
    view_filters:
      - label: "Edukasi HOCl"
        field: category
        pattern: "Edukasi HOCl"
      - label: "Luka Diabetes"
        field: category
        pattern: "Luka Diabetes"
      - label: "Tips Perawatan"
        field: category
        pattern: "Tips Perawatan"
    view_groups:
      - label: "Kategori"
        field: category
    fields:
      - label: "Judul Artikel"
        name: "title"
        widget: "string"
        hint: "Judul yang SEO-friendly, maks 60 karakter"
        pattern: [".{10,80}", "Judul harus 10-80 karakter"]

      - label: "Deskripsi / Excerpt"
        name: "description"
        widget: "text"
        hint: "Ringkasan untuk meta description & card preview (maks 160 karakter)"
        pattern: [".{20,200}", "Deskripsi harus 20-200 karakter"]

      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - "Edukasi HOCl"
          - "Luka Diabetes"
          - "Tips Perawatan"
          - "Produk & Inovasi"
          - "Berita"
        hint: "Pilih satu kategori utama"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Tag tambahan, pisahkan dengan koma"

      - label: "Emoji Icon"
        name: "icon"
        widget: "string"
        hint: "Contoh: 🦠, 🏥, 💧"
        default: "📄"

      - label: "Gambar Utama"
        name: "featured_image"
        widget: "image"
        required: false
        hint: "Gambar hero/thumbnail (rasio 16:9 disarankan)"
        media_folder: "/src/images/uploads/articles"
        public_folder: "/images/uploads/articles"

      - label: "Penulis"
        name: "author"
        widget: "string"
        default: "Tim Probiogel"

      - label: "Tanggal Terbit"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "DD/MM/YYYY"
        time_format: "HH:mm"

      - label: "Isi Artikel"
        name: "body"
        widget: "markdown"
        editor_components: ["image", "code-block"]

  # ═══════════════════════════════════════════════════════════
  # FAQ (Folder Collection — Markdown files)
  # ═══════════════════════════════════════════════════════════
  - name: "faq"
    label: "❓ FAQ"
    label_singular: "FAQ"
    folder: "src/content/faq"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{question}}"
    sortable_fields: ["order", "question"]
    fields:
      - label: "Pertanyaan"
        name: "question"
        widget: "string"

      - label: "Jawaban"
        name: "body"
        widget: "markdown"

      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - "Produk"
          - "Penggunaan"
          - "Pengiriman"
          - "Keamanan"
        default: "Produk"

      - label: "Urutan"
        name: "order"
        widget: "number"
        default: 100
        hint: "Angka kecil = tampil lebih atas"

  # ═══════════════════════════════════════════════════════════
  # PENGATURAN SITUS (File Collection)
  # ═══════════════════════════════════════════════════════════
  - name: "site_settings"
    label: "🌐 Pengaturan Situs"
    files:
      - name: "site"
        label: "Pengaturan Situs"
        file: "src/_data/site.json"
        description: "Pengaturan umum, kontak, dan SEO"
        fields:
          - label: "Nama Situs"
            name: "name"
            widget: "string"

          - label: "Tagline"
            name: "tagline"
            widget: "string"
            hint: "Slogan pendek, contoh: Technology from Japan"

          - label: "Deskripsi SEO"
            name: "description"
            widget: "text"
            hint: "Deskripsi meta untuk halaman utama (maks 160 karakter)"

          - label: "URL Situs"
            name: "url"
            widget: "string"
            hint: "URL lengkap, contoh: https://probiogel.id"
            required: false

          - label: "Logo"
            name: "logo"
            widget: "image"
            required: false
            hint: "Logo untuk navbar dan favicon"

          - label: "Alamat"
            name: "address"
            widget: "text"

          - label: "No. BPOM"
            name: "bpom"
            widget: "string"

          - label: "Nama Perusahaan"
            name: "company"
            widget: "string"

          - label: "Kontak & Sosial Media"
            name: "contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "No. WhatsApp (tanpa +)", name: "whatsapp", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "URL Instagram", name: "instagram", widget: "string", required: false }
              - { label: "URL TikTok", name: "tiktok", widget: "string", required: false }
              - { label: "URL Shopee", name: "shopee", widget: "string", required: false }
              - { label: "URL Tokopedia", name: "tokopedia", widget: "string", required: false }

          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "OG Image (1200×630)", name: "og_image", widget: "image", required: false }
              - { label: "Keywords", name: "keywords", widget: "string", required: false, hint: "Comma-separated keywords" }

  # ═══════════════════════════════════════════════════════════
  # PRODUK (Folder Collection)
  # ═══════════════════════════════════════════════════════════
  - name: "products"
    label: "🛒 Produk"
    label_singular: "Produk"
    folder: "src/content/products"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    sortable_fields: ["order", "name"]
    summary: "{{name}} — {{price}}"
    fields:
      - { label: "Urutan", name: "order", widget: "number", default: 100, hint: "Angka kecil = tampil lebih atas" }
      - { label: "Nama Produk", name: "name", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Deskripsi", name: "description", widget: "text" }
      - { label: "Harga", name: "price", widget: "string", hint: "Contoh: Rp 125.000" }
      - { label: "Ukuran", name: "size", widget: "string" }
      - label: "Foto Produk"
        name: "image"
        widget: "image"
        required: false
        media_folder: "/src/images/uploads/products"
        public_folder: "/images/uploads/products"
      - label: "Badge / Label"
        name: "badge"
        widget: "string"
        required: false
        hint: "Contoh: Best Seller, Baru, Promo"
      - label: "Produk Unggulan?"
        name: "is_popular"
        widget: "boolean"
        default: false
        hint: "Tandai sebagai produk yang di-highlight"
      - label: "Link Pembelian"
        name: "buy_url"
        widget: "string"
        required: false
        hint: "Link Shopee / Tokopedia / dll"
      - name: "features"
        label: "Fitur Utama"
        widget: "list"
        label_singular: "Fitur"
        field: { name: "feature", label: "Fitur", widget: "string" }
      - name: "certifications"
        label: "Sertifikasi"
        widget: "list"
        label_singular: "Sertifikasi"
        field: { name: "cert", label: "Sertifikasi", widget: "string" }
      - name: "ingredients"
        label: "Komposisi"
        widget: "list"
        required: false
        label_singular: "Bahan"
        field: { name: "ingredient", label: "Bahan", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # TESTIMONI (Folder Collection)
  # ═══════════════════════════════════════════════════════════
  - name: "testimonials"
    label: "⭐ Testimoni"
    label_singular: "Testimoni"
    folder: "src/content/testimonials"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    sortable_fields: ["order", "rating", "date"]
    summary: "{{name}} — ⭐{{rating}}"
    fields:
      - { label: "Urutan", name: "order", widget: "number", default: 100, hint: "Angka kecil = tampil lebih atas" }
      - { label: "Nama", name: "name", widget: "string" }
      - { label: "Inisial", name: "initials", widget: "string", hint: "2 huruf, contoh: RS" }
      - { label: "Foto (opsional)", name: "image", widget: "image", required: false }
      - { label: "Testimoni", name: "text", widget: "text" }
      - { label: "Info (profesi, kota)", name: "meta", widget: "string" }
      - { label: "Sumber", name: "source", widget: "select", options: ["via TikTok Comment", "via Instagram DM", "via Shopee Review", "via Tokopedia Review", "via WhatsApp", "via Google Review", "Langsung"] }
      - { label: "Rating (1-5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
      - { label: "Produk", name: "product", widget: "string", required: false, hint: "Nama produk yang direview" }
      - { label: "Tanggal", name: "date", widget: "datetime", required: false, format: "YYYY-MM-DD" }

  # ═══════════════════════════════════════════════════════════
  # JENIS LUKA (Folder Collection)
  # ═══════════════════════════════════════════════════════════
  - name: "wounds"
    label: "🩹 Jenis Luka"
    label_singular: "Jenis Luka"
    folder: "src/content/wounds"
    create: true
    format: "json"
    extension: "json"
    slug: "{{slug}}"
    sortable_fields: ["order", "name"]
    summary: "{{icon}} {{name}}"
    fields:
      - { label: "Urutan", name: "order", widget: "number", default: 100, hint: "Angka kecil = tampil lebih atas" }
      - { label: "Nama Luka", name: "name", widget: "string" }
      - { label: "Detail Singkat", name: "detail", widget: "string" }
      - { label: "Deskripsi Lengkap", name: "description", widget: "text", required: false, hint: "Penjelasan lebih detail untuk halaman khusus" }
      - { label: "Emoji Icon", name: "icon", widget: "string" }
      - label: "Tingkat Keparahan"
        name: "severity"
        widget: "select"
        required: false
        options:
          - { label: "Ringan", value: "ringan" }
          - { label: "Sedang", value: "sedang" }
          - { label: "Berat", value: "berat" }

  # ═══════════════════════════════════════════════════════════
  # PENGATURAN FORMULIR (File Collection)
  # ═══════════════════════════════════════════════════════════
  - name: "form_options"
    label: "📋 Formulir Konsultasi"
    files:
      - name: "form_options"
        label: "Pilihan Formulir"
        file: "src/_data/formOptions.json"
        description: "Kelola pilihan dropdown pada formulir konsultasi"
        fields:
          - name: "wound_types"
            label: "Pilihan Jenis Luka"
            widget: "list"
            label_singular: "Jenis Luka"
            field: { name: "type", label: "Jenis Luka", widget: "string" }

          - name: "durations"
            label: "Pilihan Durasi Luka"
            widget: "list"
            label_singular: "Durasi"
            field: { name: "duration", label: "Durasi", widget: "string" }

          - name: "severity_levels"
            label: "Tingkat Keparahan"
            widget: "list"
            required: false
            label_singular: "Level"
            field: { name: "level", label: "Level", widget: "string" }
